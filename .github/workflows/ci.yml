name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check audit_bim tests
      - name: Ruff format check
        run: ruff format --check audit_bim tests

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run pytest with coverage
        run: |
          pytest --cov=audit_bim --cov-report=xml --cov-report=term tests/unit
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  security-audit:
    name: Security audit (pip-audit) — uv.lock
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install uv + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install uv pip-audit
      - name: Verify lockfile is up-to-date
        # Garantit que ``uv.lock`` est cohérent avec ``pyproject.toml``.
        # Si quelqu'un a bumpé une dep sans regen le lock, la CI casse
        # ici — ce qui force le contributeur à regen + commit le lock.
        run: uv lock --check
      - name: Export resolved dependencies from lockfile
        # ``--no-emit-project`` exclut audit-bim-i3f lui-même (pas
        # publié sur PyPI). ``--no-hashes`` car pip-audit n'utilise
        # pas les hashes — seuls les ``name==version`` comptent ici.
        run: uv export --format requirements-txt --no-hashes --no-emit-project --output-file requirements-from-lock.txt
      - name: Scan locked dependencies for CVEs
        # Audit **reproductible** : exactement les versions du lockfile,
        # pas ce que pip aurait résolu fraîchement. Permet aux résultats
        # de pip-audit d'être stables tant que le lock ne change pas.
        run: pip-audit -r requirements-from-lock.txt --format columns

  security-audit-ocr:
    name: Security audit (pip-audit) — extras [ocr]
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install uv + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install uv pip-audit
      - name: Verify lockfile is up-to-date
        run: uv lock --check
      - name: Export resolved dependencies (including OCR extras)
        # ``--extra ocr`` ajoute pytesseract / pdf2image / Pillow au
        # lockfile résolu — ces deps ne sont pas dans le ``test`` extra
        # mais sont exécutées en runtime sur DOE PDF scanné.
        run: uv export --format requirements-txt --no-hashes --no-emit-project --extra ocr --output-file requirements-from-lock-ocr.txt
      - name: Scan OCR extras for CVEs
        run: pip-audit -r requirements-from-lock-ocr.txt --format columns

  integration:
    name: Integration tests (HTTP transport)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run integration tests
        # Couvre : transport streamable-http opérationnel, X-API-Key
        # (missing/wrong/valid), isolation de session entre clients.
        # Le runner GitHub autorise bind(127.0.0.1) contrairement au
        # sandbox local.
        run: pytest tests/integration -q -m integration

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [lint, test, integration, security-audit, security-audit-ocr]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: pip install build twine
      - name: Build
        run: python -m build --sdist --wheel
      - name: Check artifacts with twine
        run: twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
