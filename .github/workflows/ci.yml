name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check audit_bim tests
      - name: Ruff format check
        run: ruff format --check audit_bim tests

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run pytest with coverage
        run: |
          pytest --cov=audit_bim --cov-report=xml --cov-report=term tests/unit
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  security-audit:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package (editable) + pip-audit
        # Install éditable : le projet lui-même n'a pas à être audité
        # (il n'est pas sur PyPI), seulement ses dépendances. Combiné
        # avec ``--skip-editable`` côté pip-audit, le projet est exclu
        # proprement. Sans ``--strict`` : pip-audit retourne exit 1
        # uniquement sur vulnérabilité trouvée — c'est ce qu'on veut.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install pip-audit
      - name: Scan dependencies for CVEs
        # ``--skip-editable`` exclut le projet ; les vulns sur les deps
        # font sortir en exit 1 (qui bloque le job). Politique d'ignore
        # documentée dans SECURITY.md.
        run: pip-audit --skip-editable --format columns

  security-audit-ocr:
    name: Security audit (pip-audit) — extras [ocr]
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + ocr (editable) + pip-audit
        # Les extras ``[ocr]`` (pytesseract, pdf2image, Pillow) ne sont
        # pas inclus dans ``test`` mais sont exécutés à l'extraction
        # DOE PDF scanné. On audit leurs CVE séparément.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,ocr]"
          pip install pip-audit
      - name: Scan OCR extras for CVEs
        run: pip-audit --skip-editable --format columns

  integration:
    name: Integration tests (HTTP transport)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run integration tests
        # Couvre : transport streamable-http opérationnel, X-API-Key
        # (missing/wrong/valid), isolation de session entre clients.
        # Le runner GitHub autorise bind(127.0.0.1) contrairement au
        # sandbox local.
        run: pytest tests/integration -q -m integration

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [lint, test, integration, security-audit, security-audit-ocr]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: pip install build twine
      - name: Build
        run: python -m build --sdist --wheel
      - name: Check artifacts with twine
        run: twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
