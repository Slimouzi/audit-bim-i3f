name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ── Gates de sécurité / qualité — DOIVENT passer avant publish PyPI.
  # On duplique les jobs critiques de ci.yml plutôt que d'utiliser
  # ``workflow_run`` (qui se base sur le commit ET pas le tag — moins
  # fiable pour garantir que le commit taggé a bien été validé).
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check audit_bim tests
      - run: ruff format --check audit_bim tests

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - run: pytest tests/unit -q

  integration:
    name: Integration tests (HTTP transport)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - run: pytest tests/integration -q -m integration

  security-audit:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install pip-audit
      - run: pip-audit --skip-editable --format columns

  security-audit-ocr:
    name: Security audit (pip-audit) — extras [ocr]
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,ocr]"
          pip install pip-audit
      - run: pip-audit --skip-editable --format columns

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    # Gates obligatoires avant la moindre construction d'artifact :
    # une release qui ne passe pas la CI n'a aucune raison d'arriver
    # jusqu'à PyPI.
    needs: [lint, test, integration, security-audit, security-audit-ocr]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: pip install build twine
      - name: Build
        run: python -m build --sdist --wheel
      - name: Check artifacts
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/audit-bim-i3f
    # OIDC trusted publisher — pas besoin de stocker un token PyPI.
    # Voir https://docs.pypi.org/trusted-publishers/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  create-release:
    name: Create GitHub Release
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
