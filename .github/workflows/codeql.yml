name: CodeQL

# SAST GitHub-native : analyse taint sur Python pour identifier les
# vulnérabilités structurelles (injection, désérialisation, secrets
# hardcodés, etc.). Résultats publiés dans l'onglet Security du repo.
#
# Schedule hebdo en plus des PR/pushes : permet de détecter les
# nouvelles règles CodeQL ajoutées par GitHub sans dépendre d'une PR.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Tous les lundis 03:17 UTC — décalé pour éviter les pics horaires.
    - cron: "17 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # ``security-extended`` ajoute les règles à plus faible
          # signal/bruit que la suite standard — utile pour un projet
          # qui manipule des chemins fichiers + HTTP + serveur MCP.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
